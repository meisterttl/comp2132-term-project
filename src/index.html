<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COMP2132 Term Project</title>
    <link rel="stylesheet" href="styles/normalize.css" />
    <link rel="stylesheet" href="styles/style.css" />
    <script src="scripts/script.js" type="module" defer></script>
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
  </head>
  <body>
    <div id="container">
      <header>
        <div class="site-header">
          <div class="container">
            <div class="row">
              <div class="columns">
                <div class="site-logo">
                  <img src="images/logo.png" alt="COMP2132" />
                </div>
                <div class="site-heading">
                  <h1>Term Project</h1>
                </div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main>
        <div class="site-main">
          <div class="container">
            <div class="row">
              <div class="columns">
                <div id="game-screen" class="content">
                  <div id="display">
                    <figure>
                      <img src="images/hangman_6.png" alt="" />
                    </figure>
                  </div>

                  <div class="overlay">
                    <p class="lead extra-large">Hangman</p>

                    <div class="menu start">
                      <button id="start" class="button large" type="button">
                        Start
                      </button>
                    </div>
                  </div>

                  <div id="display-control">
                    <div id="guesses"></div>

                    <div id="keyboard" class="button-group"></div>
                  </div>
                </section>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer>
        <div class="site-footer">
          <div class="container">
            <div class="row">
              <div class="columns">
                <p>&copy; Copyleft 20** - COMP2132</p>
              </div>
            </div>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
